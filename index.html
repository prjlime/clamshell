<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clamshell</title>
    <style>
        /* 1. RESET & SYSTEM BACKGROUND */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0d;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* 2. BAND HEADER */
        header {
            text-align: center;
            padding: 80px 20px 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 8px;
            margin: 0 0 10px 0;
            color: #adebb3; /* Matches your core clamshell color */
            text-shadow: 0 0 10px rgba(173, 235, 179, 0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #555555;
            letter-spacing: 3px;
            margin: 0;
        }

        /* 3. LINK GRID CONTAINER */
        .link-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px 60px 20px;
            box-sizing: border-box;
        }

        /* 4. BAND LINK BUTTONS */
        .band-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 25px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            text-decoration: none;
            color: #ffffff;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .band-link:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(173, 235, 179, 0.3);
            transform: translateY(-2px);
        }

        .link-title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .link-handle {
            font-size: 0.85rem;
            color: #555555;
            letter-spacing: 1px;
        }

        /* Hover Glow Effects */
        .roblox-link:hover .link-title {
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        .soundcloud-link:hover .link-title {
            color: #adebb3;
            text-shadow: 0 0 8px rgba(173, 235, 179, 0.4);
        }

        /* RETURN NAVIGATION */
        .back-btn {
            display: block;
            width: fit-content;
            margin: 40px auto 0 auto;
            color: #444444;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #9bf00b;
        }
    </style>
</head>
<body>

    <!-- BAND HEADER -->
    <header>
        <h1>clamshell</h1>
        <div class="subtitle">music & links</div>
    </header>

    <!-- CONTENT CONTAINING BOTH DIRECT LINKS -->
    <div class="link-container">

        <!-- ROBLOX LINK CARD -->
        <a href="https://www.roblox.com/users/11117733148/profile" target="_blank" class="band-link roblox-link">
            <div class="link-title">roblox</div>
            <div class="link-handle">@clamshellband</div>
        </a>

        <!-- SOUNDCLOUD LINK CARD -->
        <a href="https://soundcloud.com/clamshellband" target="_blank" class="band-link soundcloud-link">
            <div class="link-title">soundcloud</div>
            <div class="link-handle">/clamshellband</div>
        </a>

        <!-- RETURN NAVIGATION -->
        <a href="../" class="back-btn">&lt; back to directory</a>

    </div>

</body>
</html>
