<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clamshell | prj lime imprint</title>
    <style>
        /* RESET AND LAYOUT SETUP */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0b0d;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD STYLING */
        .content-box {
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 50px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            max-width: 450px;
            width: 90%;
        }

        /* TYPOGRAPHY ARCHITECTURE */
        h1 {
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: 6px;
            margin: 0 0 15px 0;
            color: #adebb3;
        }
        .meta-line {
            font-size: 0.9rem;
            color: #555555;
            margin: 5px 0;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .highlight {
            color: #ffffff;
        }

        /* BACK BUTTON COMPONENT */
        .back-btn {
            display: inline-block;
            margin-top: 35px;
            padding: 10px 20px;
            font-size: 0.8rem;
            color: #666666;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            color: #9bf00b;
            border-color: rgba(155, 240, 11, 0.2);
            background: rgba(255, 255, 255, 0.01);
        }
    </style>
</head>
<body>

    <!-- SUBFOLDER NODE CONTENT -->
    <div class="main-content">
        <div class="content-box">
            <h1>clamshell</h1>
            <!-- Updated Descriptive Subtitle -->
            <p class="meta-line">musical subsidiary</p>
            <p class="meta-line">managed by <span class="highlight">[wazooks]</span></p>
            <p class="meta-line">under license to prj lime</p>
            
            <a href="../" class="back-btn">&lt; return to prj lime</a>
        </div>
    </div>

</body>
</html>
